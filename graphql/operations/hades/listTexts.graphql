query listTexts($level: CefrLevel, $sourceId: ID, $ownerId: ID, $pagination: PaginationInput) {
  hadesQueries {
    texts(level: $level, sourceId: $sourceId, ownerId: $ownerId, pagination: $pagination) {
      items {
        id
        title
        language
        level
        ownerId
        sourceId
        status
      }
      pageInfo {
        page
        size
        totalPages
        totalCount
        hasNextPage
        hasPreviousPage
      }
    }
  }
}
