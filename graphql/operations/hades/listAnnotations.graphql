query listAnnotations($textId: ID!, $includeHidden: Boolean) {
  hadesQueries {
    annotations(textId: $textId, includeHidden: $includeHidden) {
      id
      positionId
      body
      status
      upvotes
      downvotes
      netScore
      position {
        id
        textId
        startOffset
        endOffset
      }
      author {
        id
        discordId
        discordUsername
        globalName
        avatar
        cefrLevel
        roles {
          key
          name
        }
      }
    }
  }
}
