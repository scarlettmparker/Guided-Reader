query listAnnotations($textId: ID!, $includeHidden: Boolean) {
  hadesQueries {
    annotations(textId: $textId, includeHidden: $includeHidden) {
      id
      positionId
      body
      status
      upvotes
      downvotes
      netScore
      replyCount
      position {
        id
        textId
        startOffset
        endOffset
      }
      author {
        type
        id
      }
      authorProfile {
        id
        discordId
        discordUsername
        globalName
        avatar
        cefrLevel
      }
      myVote
    }
  }
}
